name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  daml:
    name: Daml model + proof suite (dpm test)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Cache dpm + SDKs
        uses: actions/cache@v4
        with:
          path: ~/.dpm
          key: dpm-sdk-3.4.11-${{ runner.os }}-v1
      - name: Install dpm + SDK 3.4.11
        run: |
          if [ ! -x "$HOME/.dpm/bin/dpm" ]; then
            curl -fsSL https://get.digitalasset.com/install/install.sh | sh
          fi
          echo "$HOME/.dpm/bin" >> "$GITHUB_PATH"
          "$HOME/.dpm/bin/dpm" install 3.4.11
      - name: Build DARs
        run: dpm build --all
      - name: Run the Daml Script proof suite
        working-directory: daml-tests
        run: dpm test

  backend:
    name: Backend (netting + agent guardrail tests)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test

  frontend:
    name: Frontend (typecheck + build)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
